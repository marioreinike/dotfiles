# Dispatcher repo map
#
# One row per repo "alias" — the directory name used INSIDE a workspace
# (~/WORKSPACES/wsN/<alias>). Columns are whitespace-separated:
#
#   <alias>   <repo_dir>            <base_branch>
#
#   alias        directory name used inside a workspace (what you say when
#                preparing a feature, e.g. "backend frontend apollo")
#   repo_dir     directory name under ~/REPOS that the worktree belongs to
#   base_branch  branch new feature branches fork from, and the baseline used
#                to decide "commits ahead" / freeness. Falls back to the
#                repo's origin/HEAD default when a repo is not listed here.
#
# Add a row whenever you start using a new repo alias inside workspaces.

# alias      repo_dir              base_branch
backend      backend               dev
frontend     turborepo-frontend    dev
infra        infra                 dev
apollo       apollo-chat           main
